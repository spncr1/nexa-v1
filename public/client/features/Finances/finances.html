<html lang="en">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>NEXA - Finances</title>
        
        <!-- CSS stylesheet -->
        <link rel="stylesheet" href="/dashboard.css">
        <link rel="stylesheet" href="/client/shared/styles/dark-mode.css">

        <!-- Primary Font (Headers & Titles - Manrope) -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">

        <!-- Secondary Font (Body Text - Noto Sans) -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        
        <!-- Favicon -->
        <link rel="icon" type="image/png" href="/client/shared/assets/Images/nexa-v1.png">
    </head>
    <body>

        <nav class="navbar">
            <button class="menu-toggle" aria-label="Toggle navigation">
                ☰
            </button>
            
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/client/features/Tasks/tasks.html">Tasks</a></li>
                <li><a href="/client/features/Assignments/assignments.html">Assignments</a></li>
                <li><a href="/client/features/StudyPlanner/study-planner.html">Study Planner</a>
                <li><a href="/client/features/Habits/habits.html">Habits</a>
                <li><a href="/client/features/JobApplications/job-applications.html">Job Applications</a>
                <li><a href="/client/features/Finances/finances.html" class="active">Finances</a>
            </ul>
        </nav>

        <main class="content">

            <h1>Coming soon...</h1>

             <!-- SYSTEM SETTINGS MODAL -->
              <div id="system-settings-modal" class="hidden" role="dialog" aria-modal="true" aria-label="System Settings">
                <div class="settings-layout">
                    <aside class="settings-sidebar">
                        <ul class="settings-sidebar-list">
                            <li><button type="button" class="settings-nav" data-tab="general">General</button></li>
                            <li><button type="button" class="settings-nav" data-tab="account">Account</button></li>
                            <li><button type="button" class="settings-nav" data-tab="customise">Customise</button></li>
                        </ul>
                    </aside>

                    <!-- Main content -->
                     <div class="settings-content">
                        <div class="settings-header">
                            <h3 class="settings-title">SYSTEM SETTINGS</h3>
                            <div id="settings-subtitle" class="settings-subtitle">General</div>
                        </div>

                        <div class="settings-body">
                            <div class="settings-panel" data-panel="general">
                                <div class="setting-row">
                                    <div>
                                        <div class="setting-labels">Reset App Data?</div>
                                    </div>
                                    <button type="button" id="reset-app-data-btn" class="setting-action-btn danger">Reset</button>
                                </div>

                                <div class="setting-row">
                                    <div>
                                        <div class="setting-labels">Load Demo Data?</div>
                                    </div>
                                    <button type="button" id="load-demo-data-btn" class="setting-action-btn success">Load</button>
                                </div>
                            </div>

                            <div class="settings-panel hidden" data-panel="account">
                                <div class="setting-row">
                                    <div>
                                        <div class="setting-labels">Name</div>
                                    </div>
                                    <input type="text" id="account-name-input" class="setting-account-input">
                                </div>

                                <div class="setting-row">
                                    <div>
                                        <div class="setting-labels">Email</div>
                                    </div>
                                    <input type="text" id="account-email-input" class="setting-account-input">
                                </div>

                                <div class="setting-row">
                                    <div>
                                        <div class="setting-labels">Semester label</div>
                                    </div>
                                    <input type="text" id="account-semester-input" class="setting-account-input">
                                </div>

                                <div class="setting-row">
                                    <div>
                                        <div class="setting-labels">Save account details</div>
                                    </div>
                                    <button type="button" id="save-account-btn" class="setting-action-btn success">Save</button>
                                </div>

                                <div class="setting-row">
                                    <div>
                                        <div class="setting-labels">Logout?</div>
                                    </div>
                                    <button type="button" id="logout-btn" class="setting-action-btn neutral">Logout</button>
                                </div>

                                <div class="setting-row">
                                    <div>
                                        <div class="setting-labels">Delete account?</div>
                                    </div>
                                    <button type="button" id="delete-account-btn" class="setting-action-btn danger">Delete</button>
                                </div>
                            </div>

                            <div class="settings-panel" data-panel="customise">
                                <div class="setting-row">
                                    <div>
                                        <div class="setting-labels">Dark mode</div>
                                    </div>

                                    <label class="switch">
                                        <input type="checkbox" id="dark-mode-toggle">
                                        <span class="slider"></span>
                                    </label>
                                </div>
                            </div>
                        </div>
                     </div>
                </div>
              </div>
              
              <!-- System Settings Button (placement)-->
             <div class="system-settings">
                <button id="system-settings-btn">⚙️</button>
             </div>
        </main>
        
        <script src="/client/shared/app-storage.js"></script>
        <script src="/client/shared/settings-modal.js"></script>
    </body>
</html>
